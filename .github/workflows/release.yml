name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'AGENTS.md'
      - '.gitignore'
      - 'LICENSE-*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - run: cargo test

      - run: cargo build --release --target ${{ matrix.target }} -p pawflash-cli -p pawflash-tauri

      - name: Stage CLI
        run: cp target/${{ matrix.target }}/release/pawflash-cli${{ matrix.os == 'windows-latest' && '.exe' || '' }} pawflash-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}

      - name: Stage GUI
        run: cp target/${{ matrix.target }}/release/pawflash-tauri${{ matrix.os == 'windows-latest' && '.exe' || '' }} pawflash-gui-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}

      - uses: actions/upload-artifact@v4
        with:
          name: pawflash-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}
          path: pawflash-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}

      - uses: actions/upload-artifact@v4
        with:
          name: pawflash-gui-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}
          path: pawflash-gui-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows.exe' }}

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set timestamp tag
        id: tag
        run: echo "TAG=release-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          prev=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## Changes since $prev" > changelog.txt
          echo "" >> changelog.txt
          git log --oneline --no-decorate "$prev"..HEAD >> changelog.txt

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.TAG }}
          body_path: changelog.txt
          files: |
            pawflash-linux/pawflash-linux
            pawflash-windows.exe/pawflash-windows.exe
            pawflash-gui-linux/pawflash-gui-linux
            pawflash-gui-windows.exe/pawflash-gui-windows.exe
          fail_on_unmatched_files: true

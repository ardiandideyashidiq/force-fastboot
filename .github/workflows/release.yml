name: Release CLI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'AGENTS.md'
      - '.gitignore'
      - 'LICENSE-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
            artifact: pawflash-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
            artifact: pawflash-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }} -p pawflash-cli

      - run: cp target/${{ matrix.target }}/release/pawflash-cli${{ matrix.suffix }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set timestamp tag
        id: tag
        run: echo "TAG=release-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          prev=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "## Changes since $prev"
            echo ""
            git log --oneline --no-decorate "$prev"..HEAD
          } > changelog.txt

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.TAG }}
          body_path: changelog.txt
          files: |
            pawflash-linux/pawflash-linux
            pawflash-windows.exe/pawflash-windows.exe
          fail_on_unmatched_files: true

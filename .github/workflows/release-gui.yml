name: Release GUI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
    paths-ignore:
      - '**.md'
      - 'AGENTS.md'
      - '.gitignore'
      - 'LICENSE-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-gui:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          deps: gui

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          uploadWorkflowArtifacts: true

  release-gui:
    needs: [build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set timestamp tag
        id: tag
        run: echo "TAG=gui-release-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          prev=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "## Changes since $prev"
            echo ""
            git log --oneline --no-decorate "$prev"..HEAD
          } > changelog.txt

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: pawflash GUI ${{ steps.tag.outputs.TAG }}
          body_path: changelog.txt
          files: ./*
          fail_on_unmatched_files: false

name: 'Setup pawflash build environment'
description: 'Checkout, install Rust toolchain (+ optional target), setup cache, install system deps'

inputs:
  target:
    description: 'Rust target triple (e.g. x86_64-unknown-linux-gnu)'
    required: false
    default: ''
  deps:
    description: 'System deps profile: cli or gui'
    required: false
    default: 'cli'
  cache-key:
    description: 'Extra cache key suffix'
    required: false
    default: ''
  fetch-depth:
    description: 'Git fetch depth (0 = full history)'
    required: false
    default: '1'

runs:
  using: composite

  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
        shared-key: pawflash
        cache-all-crates: true
        cache-on-failure: true

    - name: Install CLI system deps
      if: runner.os == 'Linux' && inputs.deps == 'cli'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Install GUI system deps
      if: runner.os == 'Linux' && inputs.deps == 'gui'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev libgtk-3-dev \
          libglib2.0-dev libxdo-dev libssl-dev \
          librsvg2-dev patchelf

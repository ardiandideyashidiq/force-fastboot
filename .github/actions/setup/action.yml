name: 'Setup pawflash build environment'
description: 'Install Rust toolchain (+ optional target), setup cache, install system deps, setup Node/pnpm for GUI'

inputs:
  target:
    description: 'Rust target triple (e.g. x86_64-unknown-linux-gnu)'
    required: false
    default: ''
  deps:
    description: 'System deps profile: cli or gui'
    required: false
    default: 'cli'
  cache-key:
    description: 'Extra cache key suffix'
    required: false
    default: ''

runs:
  using: composite

  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
        shared-key: pawflash
        cache-all-crates: true
        cache-on-failure: true

    - name: Cache apt packages
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives/
        key: ${{ runner.os }}-apt-${{ inputs.deps }}-${{ hashFiles('.github/actions/setup/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-${{ inputs.deps }}-
          ${{ runner.os }}-apt-

    - name: Install CLI system deps
      if: runner.os == 'Linux' && inputs.deps == 'cli'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev

    - name: Install GUI system deps
      if: runner.os == 'Linux' && inputs.deps == 'gui'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev libgtk-3-dev \
          libglib2.0-dev libxdo-dev libssl-dev \
          librsvg2-dev patchelf

    - name: Setup pnpm
      if: inputs.deps == 'gui'
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node
      if: inputs.deps == 'gui'
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

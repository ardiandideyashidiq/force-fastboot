[package]
name = "force-fastboot"
version = "0.1.0"
description = "Force a MediaTek device into fastboot mode via preloader serial handshake"
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/force-fastboot"
readme = "README.md"
keywords = ["fastboot", "mediatek", "preloader", "android", "usb"]
categories = ["hardware-support", "command-line-utilities"]
edition = "2024"
rust-version = "1.85"

[lints.rust]
unused = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# --- deny group: must-fix ---
cargo_common_metadata = "deny"
cast_lossless = "deny"
doc_markdown = "deny"
large_enum_variant = "deny"
missing_const_for_fn = "deny"
needless_pass_by_value = "deny"
redundant_clone = "deny"
# --- perf ---
perf = "deny"

[dependencies]
anyhow = "1"
indicatif = "0.18"
nusb = "0.2"
serialport = "4.9"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }
tracing-appender = "0.2"
